apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.artifactSecret.name }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    accesskey: {{ .Values.artifactSecret.encryptedAccessKey | quote }}
    secretkey: {{ .Values.artifactSecret.encryptedSecretKey | quote }}
  template:
    metadata:
      name: {{ .Values.artifactSecret.name }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
