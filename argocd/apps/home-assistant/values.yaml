home-assistant:
  image:
    # Empty tag → chart default (stable). Pin to a digest here if reproducibility
    # is needed. Renovate watches the `appVersion` in Chart.yaml instead.
    tag: ""

  persistence:
    enabled: true
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 10Gi

  # Web UI at http://homeassistant.homeserver — Pi-hole wildcard *.homeserver
  # already resolves this to 192.168.178.127 (Traefik). No separate DNS entry needed.
  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
      - host: homeassistant.homeserver
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # GitOps-Installation der HA-Erweiterungen. Jeder Init-Container kopiert das
  # gepinnte Release beim Pod-Start in den geteilten /config-PVC. Idempotent: das
  # Ziel wird vorher überschrieben/gelöscht, sodass die installierte Version stets
  # dem Git-Stand entspricht. Renovate hält die VERSION-Pins über den regex-Manager
  # in renovate.json aktuell. Setup-Details: docs/17-homeassistant.md.
  initContainers:
    # Bubble-Card — Lovelace-Frontend-Ressource (#86). Bezieht die gebaute
    # dist/bubble-card.js aus dem Repo-Tree am Tag (kein Release-Asset, analog HACS
    # via hacs.json: content_in_root=false, filename=bubble-card.js).
    # renovate: datasource=github-releases depName=Clooos/Bubble-Card
    - name: install-bubble-card
      image: alpine:3.24
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          VERSION=3.2.3
          apk add --no-cache curl
          mkdir -p /config/www
          curl -fsSL "https://github.com/Clooos/Bubble-Card/raw/v${VERSION}/dist/bubble-card.js" -o /config/www/bubble-card.js
      volumeMounts:
        - name: home-assistant
          mountPath: /config

    # Hourly Weather Card — Lovelace-Frontend-Ressource (#88). Tag ohne v-Präfix.
    # renovate: datasource=github-releases depName=decompil3d/lovelace-hourly-weather
    - name: install-hourly-weather
      image: alpine:3.24
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          VERSION=6.8.0
          apk add --no-cache curl
          mkdir -p /config/www/hourly-weather
          curl -fsSL "https://github.com/decompil3d/lovelace-hourly-weather/releases/download/${VERSION}/hourly-weather.js" -o /config/www/hourly-weather/hourly-weather.js
      volumeMounts:
        - name: home-assistant
          mountPath: /config

    # AI Automation Suggester — Python-Custom-Integration (#89)
    # renovate: datasource=github-releases depName=ITSpecialist111/ai_automation_suggester
    - name: install-ai-automation-suggester
      image: alpine:3.24
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          VERSION=1.5.7
          apk add --no-cache curl tar
          rm -rf /config/custom_components/ai_automation_suggester
          mkdir -p /config/custom_components
          curl -fsSL "https://github.com/ITSpecialist111/ai_automation_suggester/archive/refs/tags/v${VERSION}.tar.gz" -o /tmp/ai.tgz
          tar -xzf /tmp/ai.tgz -C /tmp
          cp -r "/tmp/ai_automation_suggester-${VERSION}/custom_components/ai_automation_suggester" /config/custom_components/ai_automation_suggester
      volumeMounts:
        - name: home-assistant
          mountPath: /config

    # Dreame Vacuum — Python-Custom-Integration für Dreame D9 Max (#90)
    # renovate: datasource=github-releases depName=Tasshack/dreame-vacuum
    - name: install-dreame-vacuum
      image: alpine:3.24
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          VERSION=1.0.10
          apk add --no-cache curl tar
          rm -rf /config/custom_components/dreame_vacuum
          mkdir -p /config/custom_components
          curl -fsSL "https://github.com/Tasshack/dreame-vacuum/archive/refs/tags/v${VERSION}.tar.gz" -o /tmp/dreame.tgz
          tar -xzf /tmp/dreame.tgz -C /tmp
          cp -r "/tmp/dreame-vacuum-${VERSION}/custom_components/dreame_vacuum" /config/custom_components/dreame_vacuum
      volumeMounts:
        - name: home-assistant
          mountPath: /config

  configuration:
    enabled: true
    forceInit: true
    trusted_proxies:
      - 10.42.0.0/16
      - 127.0.0.1

  env:
    - name: TZ
      value: Europe/Berlin

  securityContext:
    privileged: true

  additionalVolumes:
    - name: zigbee-dongle
      hostPath:
        path: /dev/serial/by-id/usb-SONOFF_SONOFF_Dongle_Plus_MG24_46718ac707a3ef11a29a8c6661ce3355-if00-port0
        type: CharDevice
    # Midnight-Theme (#91) — als einzelne Datei nach /config/themes/midnight.yaml
    - name: theme-midnight
      configMap:
        name: ha-theme-midnight

  additionalMounts:
    - name: zigbee-dongle
      mountPath: /dev/ttyUSB0
    - name: theme-midnight
      mountPath: /config/themes/midnight.yaml
      subPath: midnight.yaml

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
