home-assistant:
  image:
    # Empty tag → chart default (stable). Pin to a digest here if reproducibility
    # is needed. Renovate watches the `appVersion` in Chart.yaml instead.
    tag: ""

  persistence:
    enabled: true
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 10Gi

  # Web UI at http://homeassistant.homeserver — Pi-hole wildcard *.homeserver
  # already resolves this to 192.168.178.127 (Traefik). No separate DNS entry needed.
  ingress:
    enabled: true
    className: traefik
    annotations: {}
    hosts:
      - host: homeassistant.homeserver
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # GitOps-Installation der Solakon-ONE Custom-Integration (Balkonkraftwerk /
  # FoxESS-Hybrid-Wechselrichter, Modbus TCP, lokal). Der Init-Container kopiert
  # das gepinnte Release beim Pod-Start in den geteilten /config-PVC. Idempotent:
  # Ziel-Ordner wird vorher gelöscht, sodass die Version stets dem Git-Stand
  # entspricht. Setup-Details: docs/17-homeassistant.md.
  initContainers:
    # renovate: datasource=github-releases depName=solakon-de/solakon-one-homeassistant
    - name: install-solakon-one
      image: alpine:3.24
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          VERSION=1.5.4
          apk add --no-cache curl tar
          rm -rf /config/custom_components/solakon_one
          mkdir -p /config/custom_components
          curl -fsSL "https://github.com/solakon-de/solakon-one-homeassistant/archive/refs/tags/${VERSION}.tar.gz" -o /tmp/s.tgz
          tar -xzf /tmp/s.tgz -C /tmp
          cp -r "/tmp/solakon-one-homeassistant-${VERSION}/custom_components/solakon_one" /config/custom_components/solakon_one
      volumeMounts:
        - name: home-assistant
          mountPath: /config

  configuration:
    enabled: true
    forceInit: true
    trusted_proxies:
      - 10.42.0.0/16
      - 127.0.0.1

  env:
    - name: TZ
      value: Europe/Berlin

  securityContext:
    privileged: true

  additionalVolumes:
    - name: zigbee-dongle
      hostPath:
        path: /dev/serial/by-id/usb-SONOFF_SONOFF_Dongle_Plus_MG24_46718ac707a3ef11a29a8c6661ce3355-if00-port0
        type: CharDevice

  additionalMounts:
    - name: zigbee-dongle
      mountPath: /dev/ttyUSB0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
