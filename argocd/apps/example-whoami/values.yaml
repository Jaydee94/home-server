---
replicaCount: 1

image:
  repository: traefik/whoami
  pullPolicy: IfNotPresent
  # Pinned for reproducibility. Bump to track upstream releases:
  # https://hub.docker.com/r/traefik/whoami/tags
  tag: "v1.10.3"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: whoami.homeserver
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
