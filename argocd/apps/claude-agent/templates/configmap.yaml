---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-agent-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
data:
  MAX_PODS: {{ .Values.controller.maxPods | quote }}
  LABEL_FILTER: {{ .Values.controller.labelFilter | quote }}
  DEFAULT_PROFILE: {{ .Values.controller.defaultProfile | quote }}
  DEFAULT_FLAVORS: {{ .Values.controller.defaultFlavors | quote }}
  NTFY_URL: {{ include "claude-agent.ntfyUrl" . | quote }}
  NTFY_TOPIC: {{ .Values.ntfy.topic | quote }}
  AGENT_IMAGE: {{ printf "%s:%s" .Values.controller.image.repository .Values.controller.image.tag | quote }}
  NAMESPACE: {{ .Release.Namespace | quote }}
  SECRET_NAME: {{ .Values.secrets.name | quote }}
  TARGET_REPO: {{ .Values.controller.targetRepo | quote }}
