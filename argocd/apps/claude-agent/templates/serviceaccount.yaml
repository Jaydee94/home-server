---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: issue-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
---
# The controller only needs to manage Jobs inside its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: issue-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: issue-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: issue-controller
subjects:
  - kind: ServiceAccount
    name: issue-controller
    namespace: {{ .Release.Namespace }}
