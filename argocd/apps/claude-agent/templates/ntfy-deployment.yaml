{{- if .Values.ntfy.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "claude-agent.ntfy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-agent.ntfy.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: ntfy
          image: "{{ .Values.ntfy.image.repository }}:{{ .Values.ntfy.image.tag }}"
          imagePullPolicy: {{ .Values.ntfy.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: {{ .Values.ntfy.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ntfy.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.ntfy.persistence.mountPath }}
      volumes:
        - name: data
          {{- if .Values.ntfy.persistence.enabled }}
          persistentVolumeClaim:
            claimName: ntfy-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
