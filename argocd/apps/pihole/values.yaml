---
# Values passed through to the pihole sub-chart.
# Everything under `pihole:` is consumed by the dependency; the top-level
# `adminSecret:` block is consumed by this chart's own templates/.
pihole:
  # Pin the Pi-hole v6 image for reproducibility (chart appVersion 2026.04.1).
  image:
    repository: pihole/pihole
    tag: "2026.04.1"

  # --- DNS service: dedicated LAN IP via MetalLB ---------------------------
  # loadBalancerClass makes k3s' Klipper ServiceLB ignore this service so only
  # MetalLB claims it; loadBalancerIP + the address-pool annotation pin it to
  # 192.168.178.2 (defined in argocd/apps/metallb/templates/ipaddresspool.yaml).
  serviceDns:
    type: LoadBalancer
    loadBalancerIP: 192.168.178.2
    loadBalancerClass: metallb.universe.tf/metallb
    externalTrafficPolicy: Local
    annotations:
      # Current MetalLB annotation domain (metallb.universe.tf/* is legacy).
      metallb.io/address-pool: pihole-dns

  # Web UI is reached only through the Traefik ingress, never directly exposed.
  serviceWeb:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    path: /
    hosts:
      - pihole.homeserver

  # Persist the FTL query DB + gravity (blocklists) across restarts.
  persistentVolumeClaim:
    enabled: true
    storageClass: local-path
    size: 2Gi
    accessModes:
      - ReadWriteOnce

  # Upstream resolvers: FritzBox first (consistent with the host dnsmasq,
  # routes via the Vodafone uplink), Quad9 as a public backup.
  # NOTE: this is Pi-hole's *upstream*; it does NOT loop with the FritzBox
  # "Lokaler DNS-Server" setting, which only governs what the FritzBox hands
  # to DHCP clients (not the FritzBox's own internet resolver).
  DNS1: "192.168.178.1"
  DNS2: "9.9.9.9"

  dnsmasq:
    # Pi-hole is the SINGLE authoritative resolver for *.homeserver — the host
    # dnsmasq has been retired (see ansible/roles/host_dns). `address=/domain/ip`
    # answers every *.homeserver name with the Traefik node IP (.127), rendered
    # verbatim into /etc/dnsmasq.d. This is the same wildcard the old host
    # dnsmasq served, now owned by Pi-hole.
    customDnsEntries:
      - "address=/homeserver/192.168.178.127"

  # Admin password.
  # SAFE DEFAULT (so ArgoCD reaches Healthy on first sync without manual steps):
  # no existingSecret + empty adminPassword → the web UI comes up with NO
  # password. The ingress is LAN/Tailnet-only, but you should still set a real
  # password ASAP. To do that, seal one (see adminSecret block + docs/15) and
  # then set: admin.existingSecret=pihole-admin AND adminSecret.enabled=true.
  admin:
    enabled: true
    existingSecret: ""
    passwordKey: password
  adminPassword: ""

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Consumed by this chart's own templates/ (NOT the pihole sub-chart) ------
# SealedSecret holding the Pi-hole web-admin password.
#
# DISABLED BY DEFAULT so a fresh ArgoCD sync is Healthy without committing a
# secret (the web UI then has no password — see the admin block above). To
# protect the UI:
#   1. Seal your password:
#        echo -n "<your-admin-password>" | kubeseal --raw \
#          --namespace pihole --name pihole-admin \
#          --controller-name sealed-secrets-controller \
#          --controller-namespace sealed-secrets --from-file=/dev/stdin
#   2. Paste the output as encryptedPassword below and set enabled: true.
#   3. Set admin.existingSecret: pihole-admin in the admin block above.
# See docs/15-pihole.md.
adminSecret:
  enabled: false
  secretName: pihole-admin
  encryptedPassword: ""
