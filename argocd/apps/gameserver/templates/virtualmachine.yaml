---
{{- if and (eq .Values.vm.runStrategy "Always") (not .Values.sealedSecret.encryptedUserdata) }}
{{- fail "vm.runStrategy is 'Always' but sealedSecret.encryptedUserdata is empty — seal cloud-init first (docs/19-gameserver.md#secrets-versiegeln)" }}
{{- end }}
# KubeVirt VirtualMachine: 7 Days to Die dedicated server.
# Network: masquerade (NAT) — VM has outbound internet for Tailscale tunnel.
# No Service/MetalLB/Ingress needed — inbound access via Tailscale only.
# cloud-init: reads userdata from SealedSecret "gameserver-cloudinit".
#   Installs Docker + Tailscale, starts vinanrra/7dtd-server container.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ .Values.vm.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gameserver
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  runStrategy: {{ .Values.vm.runStrategy }}
  template:
    metadata:
      labels:
        kubevirt.io/vm: {{ .Values.vm.name }}
    spec:
      architecture: amd64
      domain:
        cpu:
          cores: {{ .Values.vm.cpu.cores }}
        memory:
          guest: {{ .Values.vm.memory.guest }}
        resources:
          requests:
            memory: {{ .Values.vm.memory.requests }}
        devices:
          disks:
            - name: os-disk
              disk:
                bus: virtio
            {{- if .Values.sealedSecret.encryptedUserdata }}
            - name: cloudinit
              disk:
                bus: virtio
            {{- end }}
          interfaces:
            - name: default
              masquerade: {}
              {{- if .Values.vm.macAddress }}
              macAddress: {{ .Values.vm.macAddress }}
              {{- end }}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: os-disk
          dataVolume:
            name: {{ .Values.dataVolume.name }}
        {{- if .Values.sealedSecret.encryptedUserdata }}
        - name: cloudinit
          cloudInitNoCloud:
            secretRef:
              name: {{ .Values.sealedSecret.secretName }}
        {{- end }}
