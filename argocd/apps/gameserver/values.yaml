---
# 7 Days to Die game server — KubeVirt VM configuration.
#
# SETUP REQUIRED before the VM can start:
#   1. Seal the cloud-init user data (contains Tailscale auth key + passwords)
#      → see docs/19-gameserver.md for the full sealing procedure
#   2. Paste the sealed output into sealedSecret.encryptedUserdata below
#   3. Change vm.runStrategy from "Halted" to "Always"
#   4. Commit + push → ArgoCD syncs → VM starts
#
# The gameserver namespace must exist before this chart renders correctly.
# ArgoCD creates it automatically via CreateNamespace=true.

# ---- VM Configuration ----
vm:
  name: 7dtd-server
  # runStrategy: Halted = VM is defined but does not start.
  # Change to "Always" once gameserver-cloudinit SealedSecret is filled in.
  runStrategy: Halted
  cpu:
    cores: 4
  memory:
    # 8 GiB RAM — 7DTD recommends 6-8 GB for 5 players
    requests: 8Gi

# ---- OS Disk (DataVolume via CDI) ----
dataVolume:
  name: 7dtd-os-disk
  # Ubuntu 22.04 LTS cloud image — CDI imports it directly from upstream
  sourceUrl: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
  # 40 Gi: OS + Docker images + 7DTD game files (~30 GB after install)
  size: 40Gi
  storageClass: local-path

# ---- Cloud-Init Secret ----
# The cloud-init userdata contains the Tailscale auth key and the 7DTD server
# password. The entire script must be sealed with kubeseal so no plaintext
# credentials are stored in Git.
#
# Seal command (run from a machine with kubeseal + cluster access):
#
#   cat docs/19-gameserver.md   # read the cloud-init template first
#
#   # Fill in your values in /tmp/7dtd-cloudinit.yaml, then:
#   printf '%s' "$(cat /tmp/7dtd-cloudinit.yaml)" | kubeseal --raw \
#     --namespace gameserver \
#     --name gameserver-cloudinit \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets \
#     --from-file=/dev/stdin
#
# Paste the output (long AgB... string) as the encryptedUserdata value below.
sealedSecret:
  secretName: gameserver-cloudinit
  # Empty → SealedSecret is not rendered; VM stays in Halted state.
  encryptedUserdata: ""
