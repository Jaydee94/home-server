---
# 7 Days to Die game server — KubeVirt VM configuration.
#
# SETUP REQUIRED before the VM can start:
#   1. Seal the cloud-init user data (contains Tailscale auth key + passwords)
#      → see docs/19-gameserver.md for the full sealing procedure
#   2. Paste the sealed output into sealedSecret.encryptedUserdata below
#   3. Change vm.runStrategy from "Halted" to "Always"
#   4. Commit + push → ArgoCD syncs → VM starts
#
# The gameserver namespace must exist before this chart renders correctly.
# ArgoCD creates it automatically via CreateNamespace=true.

# ---- VM Configuration ----
vm:
  name: 7dtd-server
  # runStrategy controls the initial state when the VM is first created.
  # After the first ArgoCD sync, this field is managed exclusively by the
  # scheduled CronJobs (ignoreDifferences in root-applicationset.yaml).
  # On-demand start: kubectl patch vm 7dtd-server -n gameserver --type merge -p '{"spec":{"runStrategy":"Always"}}'
  # On-demand stop:  kubectl patch vm 7dtd-server -n gameserver --type merge -p '{"spec":{"runStrategy":"Halted"}}'
  runStrategy: Halted
  cpu:
    cores: 4
  # macAddress: fixed MAC for the VM network interface.
  # cloud-init writes /etc/netplan/50-cloud-init.yaml with a MAC match on first boot.
  # Without a static MAC, each new VMI gets a different random MAC → netplan match fails
  # → enp1s0 stays down → no DHCP → no network → Tailscale offline.
  macAddress: "ea:8d:94:de:4f:c4"
  memory:
    # guest: RAM visible to the VM OS; requests: pod scheduling budget (guest + QEMU overhead)
    guest: 8Gi
    requests: 8.5Gi

# ---- OS Disk (DataVolume via CDI) ----
dataVolume:
  name: 7dtd-os-disk
  # Ubuntu 22.04 LTS cloud image — CDI imports it directly from upstream
  sourceUrl: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
  # 40 Gi: OS + Docker images + 7DTD game files (~30 GB after install)
  size: 40Gi
  storageClass: local-path

# ---- Cloud-Init Secret ----
# The cloud-init userdata contains the Tailscale auth key and the 7DTD server
# password. The entire script must be sealed with kubeseal so no plaintext
# credentials are stored in Git.
#
# Seal command (run from a machine with kubeseal + cluster access):
#
#   cat docs/19-gameserver.md   # read the cloud-init template first
#
#   # Fill in your values in /tmp/7dtd-cloudinit.yaml, then:
#   printf '%s' "$(cat /tmp/7dtd-cloudinit.yaml)" | kubeseal --raw \
#     --namespace gameserver \
#     --name gameserver-cloudinit \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets \
#     --from-file=/dev/stdin
#
# Paste the output (long AgB... string) as the encryptedUserdata value below.
# ---- Schedule ----
# CronJobs start the VM on Wednesday at 20:00 and stop it Thursday at 00:00.
# ArgoCD ignores runStrategy drift (see ignoreDifferences in root-applicationset.yaml),
# so the CronJobs are the sole authority over when the VM runs.
schedule:
  enabled: true
  timezone: Europe/Berlin
  start: "0 20 * * 3"   # Wednesday 20:00
  stop: "0 0 * * 4"     # Thursday 00:00 (= Wednesday midnight)
  kubectlImage: "bitnami/kubectl:latest"

sealedSecret:
  secretName: gameserver-cloudinit
  # Empty → SealedSecret is not rendered AND the cloud-init disk/volume is omitted
  # from the VirtualMachine spec (guarded template). Setting vm.runStrategy: Always
  # without filling this value will cause a Helm render error — by design.
  # Expected format: starts with "AgB" (kubeseal RSA-OAEP + AES-GCM output).
  encryptedUserdata: ""
