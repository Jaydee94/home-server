---
replicaCount: 1

image:
  repository: eclipse-mosquitto
  pullPolicy: IfNotPresent
  # Pinned for reproducibility. Bump to track upstream releases:
  # https://hub.docker.com/_/eclipse-mosquitto/tags
  tag: "2.0.22"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# eclipse-mosquitto 2.x runs as user/group "mosquitto" (UID/GID 1883). fsGroup
# makes the data PVC and the mounted password file group-readable for that UID.
podSecurityContext:
  fsGroup: 1883

securityContext:
  runAsNonRoot: true
  runAsUser: 1883
  runAsGroup: 1883
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Dedicated MetalLB LAN IP so the physical Nuki Smart Lock (and any other LAN
# MQTT client) reaches the broker directly at 192.168.178.4:1883. A ClusterIP
# would be unreachable from outside the cluster. The IP must match the metallb
# IPAddressPool "mosquitto" (argocd/apps/metallb/templates/ipaddresspool-mosquitto.yaml)
# and be a free LAN IP outside the FritzBox DHCP range. loadBalancerClass keeps
# k3s Klipper from claiming the service (see the MetalLB/Klipper gotcha in CLAUDE.md).
service:
  type: LoadBalancer
  port: 1883
  targetPort: 1883
  loadBalancerIP: 192.168.178.4
  loadBalancerClass: metallb.universe.tf/metallb
  annotations:
    metallb.io/address-pool: mosquitto

# Retained MQTT messages (incl. Home Assistant discovery configs published by the
# Nuki lock) survive pod restarts on this local-path PVC.
persistence:
  enabled: true
  storageClassName: local-path
  size: 1Gi
  accessMode: ReadWriteOnce
  mountPath: /mosquitto/data

# Broker authentication. allow_anonymous is false — clients must authenticate.
# The password file is injected from the SealedSecret rendered by
# templates/sealedsecret.yaml. Two users are expected: "homeassistant" (HA MQTT
# integration) and "nuki" (the Smart Lock). See docs/18-nuki-mqtt.md for the
# kubeseal workflow. The file content is the output of `mosquitto_passwd`.
#
# Generate the sealed value (run where kubeseal can reach the cluster controller):
#   docker run --rm eclipse-mosquitto:2.0.22 sh -c \
#     'touch /tmp/p; mosquitto_passwd -b /tmp/p homeassistant <PW1>; \
#      mosquitto_passwd -b /tmp/p nuki <PW2>; cat /tmp/p' > passwd
#   kubeseal --raw --namespace mosquitto --name mosquitto-auth \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets \
#     --from-file=passwd
# Paste the resulting string into encryptedPasswordFile below. While it is empty
# no SealedSecret is rendered and the broker pod stays pending on the missing
# secret — fill it in before expecting the broker to come up.
auth:
  secretName: mosquitto-auth
  encryptedPasswordFile: ""

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
