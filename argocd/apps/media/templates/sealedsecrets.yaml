{{- /*
SMB credentials for the csi-driver-smb node plugin (nodeStageSecretRef).
Skipped while empty so the repo lints and the SealedSecrets controller does not
error-loop on undecryptable data. The media mount only works once sealed.
*/ -}}
{{- if and .Values.smb.encryptedUsername .Values.smb.encryptedPassword }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.smb.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    username: {{ .Values.smb.encryptedUsername | quote }}
    password: {{ .Values.smb.encryptedPassword | quote }}
  template:
    metadata:
      name: {{ .Values.smb.secretName }}
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
{{- /*
Optional API keys consumed by the exporter (and reused by Homepage widgets).
One SealedSecret with a key per app; only the keys you sealed are rendered, and
the whole resource is skipped while every value is empty. The *arr apps and
SABnzbd do NOT read this — they self-generate their keys on first start.
*/ -}}
{{- if or .Values.apiKeys.sonarr .Values.apiKeys.radarr .Values.apiKeys.prowlarr .Values.apiKeys.sabnzbd .Values.apiKeys.jellyfin }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: media-api-keys
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    {{- with .Values.apiKeys.sonarr }}
    sonarr-api-key: {{ . | quote }}
    {{- end }}
    {{- with .Values.apiKeys.radarr }}
    radarr-api-key: {{ . | quote }}
    {{- end }}
    {{- with .Values.apiKeys.prowlarr }}
    prowlarr-api-key: {{ . | quote }}
    {{- end }}
    {{- with .Values.apiKeys.sabnzbd }}
    sabnzbd-api-key: {{ . | quote }}
    {{- end }}
    {{- with .Values.apiKeys.jellyfin }}
    jellyfin-api-key: {{ . | quote }}
    {{- end }}
  template:
    metadata:
      name: media-api-keys
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
