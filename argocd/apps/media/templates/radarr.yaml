---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
  labels:
    {{- include "media.labels" "radarr" | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.config.storageClass }}
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    {{- include "media.labels" "radarr" | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radarr
  template:
    metadata:
      labels:
        {{- include "media.labels" "radarr" | nindent 8 }}
    spec:
      containers:
        - name: radarr
          image: {{ .Values.images.radarr }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            {{- include "media.lsioEnv" (dict "theme" "radarr" "root" $) | nindent 12 }}
          ports:
            - name: http
              containerPort: 7878
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.arr | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: media
          persistentVolumeClaim:
            claimName: mediastack-data
---
{{ include "media.svcIngress" (dict "name" "radarr" "port" 7878 "root" $) }}
