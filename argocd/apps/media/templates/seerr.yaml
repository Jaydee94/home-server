---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  labels:
    {{- include "media.labels" "seerr" | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.config.storageClass }}
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  labels:
    {{- include "media.labels" "seerr" | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seerr
  template:
    metadata:
      labels:
        {{- include "media.labels" "seerr" | nindent 8 }}
    spec:
      initContainers:
        # Seerr runs as uid 1000; ensure it owns its config dir on the PVC.
        - name: fix-permissions
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - chown -R 1000:1000 /app/config
          volumeMounts:
            - name: config
              mountPath: /app/config
      containers:
        - name: seerr
          image: {{ .Values.images.seerr }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # Wire Seerr to the EXISTING jellyfin (other namespace) + sonarr/radarr
          # via the in-cluster UI wizard. Jellyfin URL for reference:
          #   {{ .Values.jellyfin.url }}
          env:
            - name: PUID
              value: {{ .Values.puid | quote }}
            - name: PGID
              value: {{ .Values.pgid | quote }}
            - name: UMASK
              value: "0002"
            - name: TZ
              value: {{ .Values.timezone | quote }}
          ports:
            - name: http
              containerPort: 5055
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.seerr | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config
---
{{ include "media.svcIngress" (dict "name" "seerr" "port" 5055 "root" $) }}
