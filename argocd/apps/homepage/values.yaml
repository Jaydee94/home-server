---
# All keys nested under `homepage:` because the dependency name is "homepage".
homepage:
  # RBAC: ServiceAccount + ClusterRole + ClusterRoleBinding auto-erstellt
  enableRbac: true

  serviceAccount:
    create: true

  ingress:
    main:
      enabled: true
      ingressClassName: traefik
      annotations: {}
      hosts:
        - host: home.homeserver
          paths:
            - path: /
              pathType: Prefix
      tls: []

  # PFLICHT: ohne HOMEPAGE_ALLOWED_HOSTS schlägt Kubernetes-Healthcheck fehl
  env:
    - name: HOMEPAGE_ALLOWED_HOSTS
      value: "home.homeserver"

  envFrom:
    - secretRef:
        name: homepage-credentials

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Custom-CSS (Google-/Material-Polish) aus eigener ConfigMap nach
  # /app/config/custom.css mounten — homepage lädt die Datei automatisch.
  persistence:
    customcss:
      enabled: true
      type: configMap
      name: homepage-custom-css
      mountPath: /app/config/custom.css
      subPath: custom.css

  config:
    kubernetes:
      mode: cluster

    settings:
      title: Home Server
      theme: dark
      color: teal
      headerStyle: clean
      iconStyle: color
      useEqualHeights: true
      language: de
      target: _blank
      quicklaunch:
        searchDescriptions: true
        hideInternetSearch: false
        showSearchSuggestions: true
      layout:
        Cluster:
          style: row
          columns: 3
        Media:
          style: row
          columns: 2
        NAS:
          style: row
          columns: 4
        Tools:
          style: row
          columns: 4

    widgets:
      - kubernetes:
          cluster:
            show: true
            cpu: true
            memory: true
            showLabel: true
            label: "k3s"
          nodes:
            show: true
            cpu: true
            memory: true
            showLabel: true
      - resources:
          label: Host
          cpu: true
          memory: true
          disk: /
      - datetime:
          text_size: xl
          format:
            dateStyle: long
            timeStyle: short
            hour12: false
      - search:
          provider: google
          target: _blank
          showSearchSuggestions: true

    services:
      - Kubernetes:
          - Headlamp:
              href: http://headlamp.homeserver
              description: Kubernetes Dashboard
              icon: headlamp.svg
          - kubeseal-webgui:
              href: http://kubeseal-webgui.homeserver
              description: Sealed Secrets UI
              icon: kubernetes.svg
      - Monitoring:
          - Grafana:
              href: http://grafana.homeserver
              description: Metriken & Dashboards
              icon: grafana.svg
              widget:
                type: grafana
                version: 2
                url: http://monitoring-grafana.monitoring.svc.cluster.local
                username: admin
                password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
      - Media:
          - Jellyfin:
              href: http://jellyfin.homeserver
              description: Media-Server & Live-TV
              icon: jellyfin.svg
          - Home Assistant:
              href: http://homeassistant.homeserver
              description: Home Automation
              icon: home-assistant.png
      - Gaming:
          - Gameserver-UI:
              href: http://gameserver.homeserver
              description: 7DTD KubeVirt VM-Verwaltung
              icon: mdi-zombie
      - "GitOps & CI/CD":
          - ArgoCD:
              href: http://192.168.178.127:30080
              description: GitOps Controller
              icon: argo-cd.svg
              widget:
                type: argocd
                url: http://argocd-server.argocd.svc.cluster.local
                key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
                fields: ["apps", "synced", "healthy", "outOfSync"]
          - Argo Workflows:
              href: http://argo-workflows.homeserver
              description: Private CI
              icon: https://raw.githubusercontent.com/argoproj/argo-workflows/main/docs/assets/logo.png
          - Semaphore:
              href: http://semaphore.homeserver
              description: Ansible UI
              icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/semaphore-ui.svg
      - NAS:
          - Paperless-NGX:
              href: http://jays-ugreen:8000
              description: Dokumenten-Management
              icon: paperless-ngx.svg
          - OpenCode:
              href: http://jays-ugreen:4096
              description: KI-Coding-Assistent
              icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/opencode.svg
          - TinyTeller:
              href: http://jays-ugreen:3002
              description: Finanzen
              icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/svg/actual-budget.svg
          - Day Pilot:
              href: http://jays-ugreen:3003
              description: Tagesplanung
              icon: homer.svg
      - Tools:
          - Pi-hole:
              href: http://pihole.homeserver/admin/login
              description: LAN-Adblock & DNS
              icon: pi-hole.svg
          - Gotify:
              href: http://gotify.homeserver
              description: Push-Notifications
              icon: gotify.svg
          - MinIO:
              href: http://minio.homeserver
              description: S3 Artifact Store
              icon: minio.svg

    bookmarks: []
