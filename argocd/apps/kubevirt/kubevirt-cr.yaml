---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  certificateRotateStrategy: {}
  # useEmulation: true  # Uncomment ONLY if /dev/kvm is unavailable (nested virt, very slow)
  configuration:
    developerConfiguration:
      featureGates:
        - ExpandDisks
  workloadUpdateStrategy: {}
