---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameserver-ui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: gameserver-ui }
  template:
    metadata:
      labels: { app: gameserver-ui }
    spec:
      serviceAccountName: gameserver-ui
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gameserver-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 3000 }]
          env:
            - name: GAMESERVER_NAMESPACE
              value: {{ .Values.vm.namespace | quote }}
            - name: VM_NAME
              value: {{ .Values.vm.name | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sealedSecret.secretName }}
                  key: sessionSecret
                  optional: true
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sealedSecret.secretName }}
                  key: adminPasswordHash
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
