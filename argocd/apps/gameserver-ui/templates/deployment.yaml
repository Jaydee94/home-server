---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameserver-ui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: gameserver-ui }
  template:
    metadata:
      labels: { app: gameserver-ui }
    spec:
      serviceAccountName: gameserver-ui
      securityContext:
        runAsNonRoot: true
        # Numerisch, weil das Image "USER app" (nicht-numerisch) setzt und der
        # Kubelet runAsNonRoot sonst nicht verifizieren kann (CreateContainerConfigError).
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gameserver-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 3000 }]
          env:
            - name: GAMESERVER_NAMESPACE
              value: {{ .Values.vm.namespace | quote }}
            - name: VM_NAME
              value: {{ .Values.vm.name | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sealedSecret.secretName }}
                  key: sessionSecret
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sealedSecret.secretName }}
                  key: adminPassword
                  optional: true
            - name: VM_SSH_KEY_PATH
              value: /etc/gameserver-ui/ssh/privateKey
            - name: VM_SSH_USER
              value: ubuntu
            - name: VM_TELNET_PORT
              value: "8081"
            - name: NAS_MOUNT_PATH
              value: /mnt/gameserver-data
            - name: TELNET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.telnet.secretName }}
                  key: password
                  optional: true
            - name: VM_SSH_HOST_FINGERPRINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sshSecret.secretName }}
                  key: hostFingerprint
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
            - name: ssh-key
              mountPath: /etc/gameserver-ui/ssh
              readOnly: true
            {{- if and .Values.smb.encryptedUsername .Values.smb.encryptedPassword }}
            - name: gameserver-data
              mountPath: /mnt/gameserver-data
            {{- end }}
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
        - name: ssh-key
          secret:
            secretName: {{ .Values.sshSecret.secretName }}
            defaultMode: 0400
        {{- if and .Values.smb.encryptedUsername .Values.smb.encryptedPassword }}
        - name: gameserver-data
          persistentVolumeClaim:
            claimName: gameserver-ui-data
        {{- end }}
