---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gameserver-ui
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gameserver-ui
  namespace: {{ .Values.vm.namespace }}
rules:
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gameserver-ui
  namespace: {{ .Values.vm.namespace }}
subjects:
  - kind: ServiceAccount
    name: gameserver-ui
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: gameserver-ui
  apiGroup: rbac.authorization.k8s.io
