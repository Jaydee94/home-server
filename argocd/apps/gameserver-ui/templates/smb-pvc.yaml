{{- if and .Values.smb.encryptedUsername .Values.smb.encryptedPassword }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gameserver-ui-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gameserver-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  # Bind explicitly to the static SMB PV above (no dynamic provisioning).
  volumeName: gameserver-ui-data-{{ .Release.Namespace }}
  resources:
    requests:
      storage: {{ .Values.smb.capacity }}
{{- end }}
