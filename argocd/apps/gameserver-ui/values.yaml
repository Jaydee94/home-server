---
# SMB-Mount für gameserver-data (NAS). Muster wie argocd/apps/jellyfin/.
# Share wird als ReadWriteMany PV/PVC ins Deployment gemountet (/mnt/gameserver-data).
# Solange encryptedUsername/encryptedPassword leer sind, wird kein SealedSecret gerendert
# und der Mount ist disabled.
smb:
  source: "//jays-ugreen/gameserver-data"
  capacity: "500Gi"
  mountOptions:
    - vers=3.0
    - uid=1000
    - gid=1000
    - file_mode=0664
    - dir_mode=0775
    - _netdev
    - nofail
  secretName: gameserver-ui-smbcreds
  encryptedUsername: ""
  encryptedPassword: ""

# SealedSecret mit dem SSH-Privkey für VM-Zugriff.
# Namespace: gameserver-ui. Name: gameserver-ui-ssh.
# Pubkey muss in der cloud-init-Userdata der VM stehen (gameserver/values.yaml).
sshSecret:
  secretName: gameserver-ui-ssh
  encryptedPrivateKey: ""
  encryptedPublicKey: ""
