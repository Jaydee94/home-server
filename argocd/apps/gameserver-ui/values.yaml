---
image:
  repository: ghcr.io/jaydee94/gameserver-ui
  tag: "stable"
  pullPolicy: Always

ingress:
  host: gameserver.homeserver

vm:
  namespace: gameserver
  name: 7dtd-server

victoriaMetrics:
  url: "http://vmsingle-monitoring-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428"

# SealedSecret mit Login-Daten. Solange beide Werte leer sind, wird kein
# Secret gerendert und das Deployment referenziert es optional (Pod startet,
# Login schlägt fehl) — sealen gemäß docs/20-gameserver-ui.md.
sealedSecret:
  secretName: gameserver-ui-auth
  encryptedSessionSecret: ""
  encryptedAdminPassword: ""

# SMB-Mount für gameserver-data (NAS). Muster wie argocd/apps/jellyfin/.
# Share wird als ReadWriteMany PV/PVC ins Deployment gemountet (/mnt/gameserver-data).
# Solange encryptedUsername/encryptedPassword leer sind, wird kein SealedSecret gerendert
# und der Mount ist disabled.
smb:
  source: "//jays-ugreen/gameserver-data"
  capacity: "500Gi"
  mountOptions:
    - vers=3.0
    - uid=10001
    - gid=10001
    - file_mode=0664
    - dir_mode=0775
    - _netdev
    - nofail
  secretName: gameserver-ui-smbcreds
  encryptedUsername: ""
  encryptedPassword: ""

# SealedSecret mit dem SSH-Privkey für VM-Zugriff.
# Namespace: gameserver-ui. Name: gameserver-ui-ssh.
# Pubkey muss in der cloud-init-Userdata der VM stehen (gameserver/values.yaml).
sshSecret:
  secretName: gameserver-ui-ssh
  encryptedPrivateKey: ""
  encryptedPublicKey: ""

# SealedSecret für Telnet-Passwort.
# Versiegeln: echo -n 'password' | kubeseal --raw --scope namespace-wide --namespace gameserver-ui
# Solange encryptedPassword leer ist, referenziert die Umgebungsvariable das Secret optional.
telnet:
  secretName: gameserver-ui-telnet
  encryptedPassword: ""
