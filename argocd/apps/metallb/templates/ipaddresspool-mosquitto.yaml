---
# Dedicated LAN IP for the Mosquitto MQTT broker LoadBalancer Service, so the
# physical Nuki Smart Lock (and other LAN MQTT clients) can reach the broker
# directly at 192.168.178.4:1883 — a ClusterIP would be unreachable from the LAN.
# Must be a free LAN IP OUTSIDE the FritzBox DHCP range (same rule as the
# Pi-hole/Jellyfin IPs, see docs/15-pihole.md / docs/18-nuki-mqtt.md).
# autoAssign:false → only handed out when a Service explicitly requests it
# (mosquitto sets loadBalancerIP + the metallb.io/address-pool annotation).
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: mosquitto
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  addresses:
    - 192.168.178.4/32
  autoAssign: false
