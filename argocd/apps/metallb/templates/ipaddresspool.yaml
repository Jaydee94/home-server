---
# Single-address pool: only Pi-hole's DNS IP is handed out by MetalLB.
# Must be a free LAN IP OUTSIDE the FritzBox DHCP range (see docs/15-pihole.md).
# sync-wave 1 → applied after the MetalLB controller/CRDs (wave 0) are up, so
# the validating webhook is ready when this CR lands.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: pihole-dns
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  addresses:
    - 192.168.178.2/32
  autoAssign: false
