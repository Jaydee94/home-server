---
name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Job names below MUST stay as "yamllint" and "helm lint (all charts)" because
# the branch-protection rule on main requires those exact status-check names.

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install yamllint
        run: pip install yamllint
      - name: Collect changed YAML files
        id: changes
        run: .github/scripts/changed-files.sh yaml >> "$GITHUB_OUTPUT"
      - name: Run yamllint on changed files
        run: |
          set -euo pipefail
          if [ -z "${{ steps.changes.outputs.files }}" ]; then
            echo "No changed YAML files — nothing to lint."
          else
            printf '  %s\n' ${{ steps.changes.outputs.files }}
            yamllint -c .yamllint ${{ steps.changes.outputs.files }}
          fi

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install ansible + ansible-lint
        run: pip install ansible ansible-lint
      - name: Install required collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Run ansible-lint
        run: ansible-lint ansible/

  helm-lint:
    name: helm lint (all charts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
      - name: Collect changed Helm charts
        id: charts
        run: .github/scripts/changed-files.sh charts >> "$GITHUB_OUTPUT"
      - name: Lint changed charts
        run: |
          set -euo pipefail
          if [ -z "${{ steps.charts.outputs.charts }}" ]; then
            echo "No changed Helm charts — nothing to lint."
          else
            rc=0
            for chart in ${{ steps.charts.outputs.charts }}; do
              if grep -q '^dependencies:' "${chart}Chart.yaml"; then
                echo "==> helm dependency build ${chart}"
                helm dependency build "${chart}" || helm dependency update "${chart}"
              fi
              echo "==> helm lint ${chart}"
              helm lint "${chart}" || rc=1
            done
            exit "${rc}"
          fi
