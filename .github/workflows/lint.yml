---
name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Job names below MUST stay as "yamllint" and "helm lint (all charts)" because
# the branch-protection rule on main requires those exact status-check names.

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install yamllint
        run: pip install yamllint
      - name: Detect changed YAML files
        id: changed
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          files: |
            **/*.yml
            **/*.yaml
          files_ignore: |
            argocd/apps/*/templates/**
      - name: Run yamllint on changed files
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          set -euo pipefail
          printf '  %s\n' ${{ steps.changed.outputs.all_changed_files }}
          yamllint -c .yamllint ${{ steps.changed.outputs.all_changed_files }}
      - name: No YAML changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No changed YAML files — nothing to lint."

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install ansible + ansible-lint
        run: pip install ansible ansible-lint
      - name: Install required collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Run ansible-lint
        run: ansible-lint ansible/

  helm-lint:
    name: helm lint (all charts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Detect changed charts
        id: list-changed
        run: |
          set -euo pipefail
          changed="$(ct list-changed --config .github/ct.yaml)"
          if [ -n "${changed}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed charts:"
            # shellcheck disable=SC2086  # intentional word-splitting: one chart per line
            printf '  %s\n' ${changed}
          else
            echo "No changed Helm charts — nothing to lint."
          fi
      - name: helm lint changed charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .github/ct.yaml

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          fail-on-error: true
