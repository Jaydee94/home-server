---
name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: azure/setup-helm@v5
      - name: Install linters
        run: pip install yamllint ansible ansible-lint
      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Collect changed YAML files
        id: yaml
        run: .github/scripts/changed-files.sh yaml >> "$GITHUB_OUTPUT"
      - name: yamllint (changed files)
        run: |
          set -euo pipefail
          if [ -z "${{ steps.yaml.outputs.files }}" ]; then
            echo "No changed YAML files — skipping yamllint."
          else
            echo "Linting changed YAML files:"
            printf '  %s\n' ${{ steps.yaml.outputs.files }}
            yamllint -c .yamllint ${{ steps.yaml.outputs.files }}
          fi

      - name: Collect changed Helm charts
        id: charts
        run: .github/scripts/changed-files.sh charts >> "$GITHUB_OUTPUT"
      - name: helm lint (changed charts)
        run: |
          set -euo pipefail
          if [ -z "${{ steps.charts.outputs.charts }}" ]; then
            echo "No changed Helm charts — skipping helm lint."
          else
            rc=0
            for chart in ${{ steps.charts.outputs.charts }}; do
              if grep -q '^dependencies:' "${chart}Chart.yaml"; then
                echo "==> helm dependency build ${chart}"
                helm dependency build "${chart}" || helm dependency update "${chart}"
              fi
              echo "==> helm lint ${chart}"
              helm lint "${chart}" || rc=1
            done
            exit "${rc}"
          fi

      - name: ansible-lint
        run: ansible-lint ansible/
