---
# Inventory for the home-server playbook.
# Only one host is needed — k3s runs as a single-node cluster.
all:
  children:
    homeservers:
      hosts:
        homeserver:
          # IP or DNS name of your server.
          ansible_host: 192.168.1.100         # CHANGE: your server's IP

          # SSH user with passwordless sudo on the target.
          ansible_user: ubuntu

          # Path to the private SSH key. Override if you store it elsewhere.
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

          # Force Python 3 — Ubuntu 24.04 ships with Python 3.12.
          ansible_python_interpreter: /usr/bin/python3
