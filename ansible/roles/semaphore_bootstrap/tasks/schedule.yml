---
# ============================================================
# Provision one cron schedule for a template inside the current
# project. Idempotent: GET list → POST if a schedule with that
# name doesn't exist yet, else PUT the full desired body so the
# cron expression is self-healing on re-runs.
#
# Schedules are evaluated in SEMAPHORE_SCHEDULE_TIMEZONE (set to
# Europe/Berlin in the Semaphore Deployment), so "0 6 * * *" fires
# at 06:00 local time year-round.
# ============================================================

- name: List existing schedules in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/schedules"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_sched_existing

- name: Decide if schedule '{{ schedule_spec.name }}' exists
  ansible.builtin.set_fact:
    schedule_exists: >-
      {{ (sem_sched_existing.json
          | selectattr('name', 'equalto', schedule_spec.name)
          | list | length) > 0 }}

- name: Find existing schedule id for '{{ schedule_spec.name }}'
  ansible.builtin.set_fact:
    schedule_id: >-
      {{ (sem_sched_existing.json
           | selectattr('name', 'equalto', schedule_spec.name)
           | list | first | default({})).id | default(none) }}
  when: schedule_exists

- name: Assert template '{{ schedule_spec.template }}' exists for schedule '{{ schedule_spec.name }}'
  ansible.builtin.assert:
    that: "schedule_spec.template in project_template_map"
    fail_msg: >-
      Schedule '{{ schedule_spec.name }}' references unknown template
      '{{ schedule_spec.template }}' in project '{{ project_spec.name }}'.
      Available templates: {{ project_template_map.keys() | list }}.

# Jinja dict literal so project_id/template_id stay JSON integers —
# Semaphore's Go decoder rejects stringified ints (see template.yml).
- name: Create schedule '{{ schedule_spec.name }}'
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/schedules"
    method: POST
    body_format: json
    body: >-
      {{
        {
          'project_id': project_id | int,
          'template_id': project_template_map[schedule_spec.template] | int,
          'name': schedule_spec.name,
          'cron_format': schedule_spec.cron,
          'active': schedule_spec.active | default(true),
        }
      }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
  when: not schedule_exists

- name: Update schedule '{{ schedule_spec.name }}'
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/schedules/{{ schedule_id | int }}"
    method: PUT
    body_format: json
    body: >-
      {{
        {
          'id': schedule_id | int,
          'project_id': project_id | int,
          'template_id': project_template_map[schedule_spec.template] | int,
          'name': schedule_spec.name,
          'cron_format': schedule_spec.cron,
          'active': schedule_spec.active | default(true),
        }
      }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 204]
  when: schedule_exists
  changed_when: false
