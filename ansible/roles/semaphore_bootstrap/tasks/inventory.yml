---
# ============================================================
# Provision one inventory entry inside the current project.
# `ssh_key` field references a key by name from semaphore_default_keys.
# ============================================================

- name: List existing inventories in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/inventory"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_inv_existing

- name: Decide if inventory exists for {{ inventory_spec.name }}
  ansible.builtin.set_fact:
    inventory_exists: >-
      {{ (sem_inv_existing.json
          | selectattr('name', 'equalto', inventory_spec.name)
          | list | length) > 0 }}

- name: Find existing inventory id for {{ inventory_spec.name }}
  ansible.builtin.set_fact:
    inventory_id: >-
      {{ (sem_inv_existing.json
           | selectattr('name', 'equalto', inventory_spec.name)
           | list | first | default({})).id | default(none) }}
  when: inventory_exists

- name: Create inventory {{ inventory_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/inventory"
    method: POST
    body_format: json
    body:
      name: "{{ inventory_spec.name }}"
      project_id: "{{ project_id | int }}"
      inventory: "{{ inventory_spec.content }}"
      ssh_key_id: "{{ project_key_map[inventory_spec.ssh_key] | int }}"
      become_key_id: null
      repository_id: null
      type: "{{ inventory_spec.type | default('static') }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
  when: not inventory_exists

# Existing inventories may pre-date a content change in defaults/main.yml.
# PUT the full desired body so re-running the bootstrap is self-healing —
# same pattern as template.yml.
- name: Update inventory {{ inventory_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/inventory/{{ inventory_id | int }}"
    method: PUT
    body_format: json
    body:
      id: "{{ inventory_id | int }}"
      name: "{{ inventory_spec.name }}"
      project_id: "{{ project_id | int }}"
      inventory: "{{ inventory_spec.content }}"
      ssh_key_id: "{{ project_key_map[inventory_spec.ssh_key] | int }}"
      become_key_id: null
      repository_id: null
      type: "{{ inventory_spec.type | default('static') }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 204]
  when: inventory_exists
  changed_when: false
