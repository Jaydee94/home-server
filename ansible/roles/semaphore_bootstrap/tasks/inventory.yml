---
# ============================================================
# Provision one inventory entry inside the current project.
# Note: ansible.builtin.uri returns 400 on this endpoint — all
# mutating calls use curl via shell to work around this.
# ============================================================

- name: List existing inventories in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/inventory"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_inv_existing

- name: Decide if inventory exists for {{ inventory_spec.name }}
  ansible.builtin.set_fact:
    inventory_exists: >-
      {{ (sem_inv_existing.json
          | selectattr('name', 'equalto', inventory_spec.name)
          | list | length) > 0 }}

- name: Find existing inventory id for {{ inventory_spec.name }}
  ansible.builtin.set_fact:
    inventory_id: >-
      {{ (sem_inv_existing.json
           | selectattr('name', 'equalto', inventory_spec.name)
           | list | first | default({})).id | default(none) }}
  when: inventory_exists

# Use Python + curl — uri module returns 400 on this endpoint.
- name: Create inventory {{ inventory_spec.name }}
  ansible.builtin.shell: |
    set -euo pipefail
    python3 << 'PYEOF'
    import json, subprocess, sys, os

    body = {
        'name':          os.environ['INV_NAME'],
        'project_id':    int(os.environ['PROJECT_ID']),
        'inventory':     os.environ['INV_CONTENT'],
        'ssh_key_id':    int(os.environ['SSH_KEY_ID']),
        'become_key_id': None,
        'repository_id': None,
        'type':          os.environ['INV_TYPE'],
    }

    result = subprocess.run(
        ['curl', '-s', '-w', '\n%{http_code}',
         '-X', 'POST',
         os.environ['SEM_API_BASE'] + '/api/project/' + os.environ['PROJECT_ID'] + '/inventory',
         '-H', 'Content-Type: application/json',
         '-H', 'Cookie: ' + os.environ['SEM_COOKIE'],
         '-d', json.dumps(body)],
        capture_output=True, text=True,
    )
    lines = result.stdout.strip().split('\n')
    status = lines[-1]
    body_resp = '\n'.join(lines[:-1])
    if status not in ('200', '201'):
        print(f'HTTP {status}: {body_resp}', file=sys.stderr)
        sys.exit(1)
    resp = json.loads(body_resp)
    print(resp['id'])
    PYEOF
  args:
    executable: /bin/bash
  environment:
    INV_NAME:     "{{ inventory_spec.name }}"
    PROJECT_ID:   "{{ project_id | string }}"
    INV_CONTENT:  "{{ inventory_spec.content }}"
    SSH_KEY_ID:   "{{ project_key_map[inventory_spec.ssh_key] | string }}"
    INV_TYPE:     "{{ inventory_spec.type | default('static') }}"
    SEM_COOKIE:   "{{ semaphore_cookie }}"
    SEM_API_BASE: "{{ semaphore_api_base }}"
  register: sem_inv_create
  changed_when: true
  when: not inventory_exists

- name: Fail with details if inventory creation failed
  ansible.builtin.fail:
    msg: "Inventory '{{ inventory_spec.name }}' creation failed: {{ sem_inv_create.stderr | default('unknown error') }}"
  when:
    - not inventory_exists
    - sem_inv_create is not skipped
    - sem_inv_create is failed

- name: Capture new inventory id for {{ inventory_spec.name }}
  ansible.builtin.set_fact:
    inventory_id: "{{ sem_inv_create.stdout | trim }}"
  when:
    - not inventory_exists
    - sem_inv_create is not skipped

# Existing inventories may pre-date a content change in defaults/main.yml.
# PUT the full desired body so re-running the bootstrap is self-healing.
- name: Update inventory {{ inventory_spec.name }}
  ansible.builtin.shell: |
    set -euo pipefail
    python3 << 'PYEOF'
    import json, subprocess, sys, os

    body = {
        'id':            int(os.environ['INV_ID']),
        'name':          os.environ['INV_NAME'],
        'project_id':    int(os.environ['PROJECT_ID']),
        'inventory':     os.environ['INV_CONTENT'],
        'ssh_key_id':    int(os.environ['SSH_KEY_ID']),
        'become_key_id': None,
        'repository_id': None,
        'type':          os.environ['INV_TYPE'],
    }

    result = subprocess.run(
        ['curl', '-s', '-w', '\n%{http_code}',
         '-X', 'PUT',
         os.environ['SEM_API_BASE'] + '/api/project/' + os.environ['PROJECT_ID'] + '/inventory/' + os.environ['INV_ID'],
         '-H', 'Content-Type: application/json',
         '-H', 'Cookie: ' + os.environ['SEM_COOKIE'],
         '-d', json.dumps(body)],
        capture_output=True, text=True,
    )
    lines = result.stdout.strip().split('\n')
    status = lines[-1]
    body_resp = '\n'.join(lines[:-1])
    if status not in ('200', '204'):
        print(f'HTTP {status}: {body_resp}', file=sys.stderr)
        sys.exit(1)
    PYEOF
  args:
    executable: /bin/bash
  environment:
    INV_ID:       "{{ inventory_id | string }}"
    INV_NAME:     "{{ inventory_spec.name }}"
    PROJECT_ID:   "{{ project_id | string }}"
    INV_CONTENT:  "{{ inventory_spec.content }}"
    SSH_KEY_ID:   "{{ project_key_map[inventory_spec.ssh_key] | string }}"
    INV_TYPE:     "{{ inventory_spec.type | default('static') }}"
    SEM_COOKIE:   "{{ semaphore_cookie }}"
    SEM_API_BASE: "{{ semaphore_api_base }}"
  register: sem_inv_update
  changed_when: false
  when: inventory_exists

- name: Fail with details if inventory update failed
  ansible.builtin.fail:
    msg: "Inventory '{{ inventory_spec.name }}' update failed: {{ sem_inv_update.stderr | default('unknown error') }}"
  when:
    - inventory_exists
    - sem_inv_update is not skipped
    - sem_inv_update is failed
