---
# ============================================================
# Provision one access key inside the current project.
# Note: ansible.builtin.uri has issues POSTing to Semaphore's
# /api/project/{id}/keys endpoint (returns 400 with empty body).
# All key types use curl via shell to work around this.
# ============================================================

- name: List existing keys in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_keys_existing

- name: Decide if key exists in project {{ project_spec.name }}
  ansible.builtin.set_fact:
    key_exists: >-
      {{ (sem_keys_existing.json
          | selectattr('name', 'equalto', key_spec.name)
          | list | length) > 0 }}

- name: Read Semaphore SSH private key from disk
  ansible.builtin.slurp:
    src: "{{ semaphore_ssh_private_key_path }}"
  register: sem_ssh_priv_slurp
  no_log: true
  when:
    - not key_exists
    - key_spec.type == "ssh"

# Use Python + curl for all key types — uri module returns 400 on this endpoint.
- name: Create access key '{{ key_spec.name }}' (type={{ key_spec.type }}) in project {{ project_spec.name }}
  ansible.builtin.shell: |
    set -euo pipefail
    python3 << 'PYEOF'
    import json, base64, subprocess, sys, os

    key_type = os.environ['KEY_TYPE']
    project_id = int(os.environ['PROJECT_ID'])

    if key_type == 'ssh':
        raw_key = base64.b64decode(os.environ['SEM_KEY_B64']).decode('utf-8')
        body = {
            'name':       os.environ['KEY_NAME'],
            'type':       'ssh',
            'project_id': project_id,
            'ssh': {
                'login':       os.environ['KEY_LOGIN'],
                'passphrase':  '',
                'private_key': raw_key,
            },
        }
    elif key_type == 'none':
        body = {
            'name':       os.environ['KEY_NAME'],
            'type':       'none',
            'project_id': project_id,
        }
    elif key_type == 'login_password':
        body = {
            'name':       os.environ['KEY_NAME'],
            'type':       'login_password',
            'project_id': project_id,
            'login_password': {
                'login':    '',
                'password': os.environ['VAULT_PASSWORD'],
            },
        }
    else:
        print(f'Unknown key type: {key_type}', file=sys.stderr)
        sys.exit(1)

    result = subprocess.run(
        ['curl', '-s', '-w', '\n%{http_code}',
         '-X', 'POST',
         os.environ['SEM_API_BASE'] + '/api/project/' + os.environ['PROJECT_ID'] + '/keys',
         '-H', 'Content-Type: application/json',
         '-H', 'Cookie: ' + os.environ['SEM_COOKIE'],
         '-d', json.dumps(body)],
        capture_output=True, text=True,
    )
    lines = result.stdout.strip().split('\n')
    status = lines[-1]
    body_resp = '\n'.join(lines[:-1])
    if status not in ('200', '201', '204'):
        print(f'HTTP {status}: {body_resp}', file=sys.stderr)
        sys.exit(1)
    PYEOF
  args:
    executable: /bin/bash
  environment:
    KEY_TYPE:       "{{ key_spec.type }}"
    KEY_NAME:       "{{ key_spec.name }}"
    KEY_LOGIN:      "{{ key_spec.login | default('') }}"
    PROJECT_ID:     "{{ project_id | string }}"
    SEM_KEY_B64:    "{{ sem_ssh_priv_slurp.content | default('') }}"
    VAULT_PASSWORD: "{{ semaphore_vault_password | default('') }}"
    SEM_COOKIE:     "{{ semaphore_cookie }}"
    SEM_API_BASE:   "{{ semaphore_api_base }}"
  register: sem_key_create
  changed_when: true
  no_log: true
  when: not key_exists

- name: Fail with details if key creation failed
  ansible.builtin.fail:
    msg: "Key '{{ key_spec.name }}' ({{ key_spec.type }}) creation failed: {{ sem_key_create.stderr | default('unknown error') }}"
  when:
    - not key_exists
    - sem_key_create is not skipped
    - sem_key_create is failed
