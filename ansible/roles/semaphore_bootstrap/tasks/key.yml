---
# ============================================================
# Provision one access key inside the current project.
# Type "ssh" carries the Semaphore-owned id_ed25519 private key;
# type "none" is for public-HTTPS git repositories.
#
# body_format: raw + to_json is intentional: Ansible's body_format: json
# serializes "{{ project_id | int }}" as a JSON string instead of an integer,
# which causes Semaphore's Go JSON decoder to return HTTP 400. Building the
# dict literal inside Jinja2 and piping to to_json preserves native int type.
# ============================================================

- name: List existing keys in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_keys_existing

- name: Decide if key exists in project {{ project_spec.name }}
  ansible.builtin.set_fact:
    key_exists: >-
      {{ (sem_keys_existing.json
          | selectattr('name', 'equalto', key_spec.name)
          | list | length) > 0 }}

- name: Read Semaphore SSH private key from disk
  ansible.builtin.slurp:
    src: "{{ semaphore_ssh_private_key_path }}"
  register: sem_ssh_priv_slurp
  no_log: true
  when:
    - key_spec.type == "ssh"

# `semaphore_pem_newline` (set in login.yml) is a real LF char. Writing `'\n'`
# inline in a folded scalar would produce a literal 2-char `\n` string — Semaphore
# would then reject the stored PEM with "ssh: no key found".
- name: Create SSH access key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: raw
    body: >-
      {{ {'name': key_spec.name, 'type': 'ssh', 'project_id': project_id | int,
          'ssh': {'login': key_spec.login, 'passphrase': '',
                  'private_key': (sem_ssh_priv_slurp.content | b64decode | trim) + semaphore_pem_newline}
         } | to_json }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
      Content-Type: "application/json"
    status_code: [200, 201, 204]
    return_content: true
  no_log: true
  register: sem_key_create
  failed_when: false
  when:
    - not key_exists
    - key_spec.type == "ssh"

- name: Fail with visible HTTP details if SSH key creation failed
  ansible.builtin.fail:
    msg: >-
      SSH key creation returned HTTP {{ sem_key_create.status }}:
      {{ sem_key_create.content | default(sem_key_create.json | default('no body') | string) }}
  when:
    - not key_exists
    - key_spec.type == "ssh"
    - sem_key_create is not skipped
    - sem_key_create.status not in [200, 201, 204]

- name: Find existing ssh key id for {{ key_spec.name }}
  ansible.builtin.set_fact:
    _existing_ssh_key_id: >-
      {{ (sem_keys_existing.json
          | selectattr('name', 'equalto', key_spec.name)
          | list | first | default({})).id | default(none) }}
  when:
    - key_exists
    - key_spec.type == "ssh"

- name: Update SSH key {{ key_spec.name }} in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys/{{ _existing_ssh_key_id }}"
    method: PUT
    body_format: raw
    body: >-
      {{ {'id': _existing_ssh_key_id | int, 'name': key_spec.name,
          'type': 'ssh', 'project_id': project_id | int,
          'override_secret': true,
          'ssh': {'login': key_spec.login, 'passphrase': '',
                  'private_key': (sem_ssh_priv_slurp.content | b64decode | trim) + semaphore_pem_newline}
         } | to_json }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
      Content-Type: "application/json"
    status_code: [200, 204]
  no_log: true
  changed_when: false
  when:
    - key_exists
    - key_spec.type == "ssh"

- name: Create None access key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: raw
    body: >-
      {{ {'name': key_spec.name, 'type': 'none', 'project_id': project_id | int} | to_json }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
      Content-Type: "application/json"
    status_code: [200, 201, 204]
  when:
    - not key_exists
    - key_spec.type == "none"

- name: Create login_password key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: raw
    body: >-
      {{ {'name': key_spec.name, 'type': 'login_password', 'project_id': project_id | int,
          'login_password': {'login': '', 'password': semaphore_vault_password}
         } | to_json }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
      Content-Type: "application/json"
    status_code: [200, 201, 204]
  no_log: true
  register: sem_vaultkey_create
  failed_when: false
  when:
    - not key_exists
    - key_spec.type == "login_password"

- name: Fail with HTTP details if vault key creation failed
  ansible.builtin.fail:
    msg: >-
      Vault key creation returned HTTP {{ sem_vaultkey_create.status }}:
      {{ sem_vaultkey_create.content | default(sem_vaultkey_create.msg | default('no message')) }}
  when:
    - not key_exists
    - key_spec.type == "login_password"
    - sem_vaultkey_create is not skipped
    - sem_vaultkey_create.status not in [200, 201, 204]

- name: Find existing login_password key id for {{ key_spec.name }}
  ansible.builtin.set_fact:
    _existing_key_id: >-
      {{ (sem_keys_existing.json
          | selectattr('name', 'equalto', key_spec.name)
          | list | first | default({})).id | default(none) }}
  when:
    - key_exists
    - key_spec.type == "login_password"

- name: Update login_password key {{ key_spec.name }} in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys/{{ _existing_key_id }}"
    method: PUT
    body_format: raw
    body: >-
      {{ {'id': _existing_key_id | int, 'name': key_spec.name,
          'type': 'login_password', 'project_id': project_id | int,
          'override_secret': true,
          'login_password': {'login': '', 'password': semaphore_vault_password}
         } | to_json }}
    headers:
      Cookie: "{{ semaphore_cookie }}"
      Content-Type: "application/json"
    status_code: [200, 204]
  no_log: true
  changed_when: false
  when:
    - key_exists
    - key_spec.type == "login_password"
