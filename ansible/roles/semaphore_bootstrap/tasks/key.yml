---
# ============================================================
# Provision one access key inside the current project.
# Type "ssh" carries the Semaphore-owned id_ed25519 private key;
# type "none" is for public-HTTPS git repositories.
# ============================================================

- name: List existing keys in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: GET
    headers:
      Cookie: "{{ semaphore_cookie }}"
    return_content: true
  register: sem_keys_existing

- name: Decide if key exists in project {{ project_spec.name }}
  ansible.builtin.set_fact:
    key_exists: >-
      {{ (sem_keys_existing.json
          | selectattr('name', 'equalto', key_spec.name)
          | list | length) > 0 }}

- name: Read Semaphore SSH private key from disk
  ansible.builtin.slurp:
    src: "{{ semaphore_ssh_private_key_path }}"
  register: sem_ssh_priv_slurp
  no_log: true
  when:
    - not key_exists
    - key_spec.type == "ssh"

- name: Create SSH access key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: json
    body:
      name: "{{ key_spec.name }}"
      type: ssh
      project_id: "{{ project_id | int }}"
      ssh:
        login: "{{ key_spec.login }}"
        passphrase: ""
        private_key: "{{ (sem_ssh_priv_slurp.content | b64decode | trim) + '\n' }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
    return_content: true
  no_log: true
  register: sem_key_create
  failed_when: false
  when:
    - not key_exists
    - key_spec.type == "ssh"

- name: Fail with visible HTTP details if SSH key creation failed
  ansible.builtin.fail:
    msg: >-
      SSH key creation returned HTTP {{ sem_key_create.status }}:
      {{ sem_key_create.content | default(sem_key_create.json | default('no body') | string) }}
  when:
    - not key_exists
    - key_spec.type == "ssh"
    - sem_key_create is not skipped
    - sem_key_create.status not in [200, 201, 204]

- name: Create None access key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: json
    body:
      name: "{{ key_spec.name }}"
      type: none
      project_id: "{{ project_id | int }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
  when:
    - not key_exists
    - key_spec.type == "none"

- name: Create login_password key in project {{ project_spec.name }}
  ansible.builtin.uri:
    url: "{{ semaphore_api_base }}/api/project/{{ project_id }}/keys"
    method: POST
    body_format: json
    body:
      name: "{{ key_spec.name }}"
      type: login_password
      project_id: "{{ project_id | int }}"
      login_password:
        login: ""
        password: "{{ semaphore_vault_password }}"
    headers:
      Cookie: "{{ semaphore_cookie }}"
    status_code: [200, 201, 204]
  no_log: true
  register: sem_vaultkey_create
  failed_when: false
  when:
    - not key_exists
    - key_spec.type == "login_password"

- name: Fail with HTTP details if vault key creation failed
  ansible.builtin.fail:
    msg: >-
      Vault key creation returned HTTP {{ sem_vaultkey_create.status }}:
      {{ sem_vaultkey_create.msg | default('no message') }}
  when:
    - not key_exists
    - key_spec.type == "login_password"
    - sem_vaultkey_create is not skipped
    - sem_vaultkey_create.status not in [200, 201, 204]
