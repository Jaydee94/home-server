---
# ============================================================
# dnsmasq role — wildcard DNS für *.homeserver
# ============================================================
# dnsmasq lauscht auf der LAN-IP und auf tailscale0 (bind-dynamic).
# Der Server selbst nimmt dnsmasq als primary + Fritz!Box als Fallback.
#
# ACHTUNG: Diese Rolle macht den Home-Server NICHT automatisch zum
# DNS-Server für dein gesamtes LAN — das wäre ein Single Point of
# Failure. Stattdessen ist *.homeserver-Auflösung *opt-in* pro Gerät.
# Empfohlener Weg: Tailscale Split DNS. Details und Alternativen in
# docs/09-dns-architecture.md.
# ============================================================

- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: "{{ 'latest' if auto_upgrade | bool else 'present' }}"
    update_cache: true

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Allow DNS from local subnet (UFW)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
    src: "{{ local_subnet }}"
  loop:
    - tcp
    - udp

- name: Allow DNS from Tailnet (UFW)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
    src: "100.64.0.0/10"
  loop:
    - tcp
    - udp

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

# ---- Host DNS via systemd-resolved -------------------------
# Don't clobber /etc/resolv.conf directly: on Ubuntu it's a symlink managed by
# systemd-resolved, which would fight (and likely revert) a hand-written static
# file on the next network event. Instead point resolved at dnsmasq as primary
# DNS — dnsmasq answers *.homeserver locally and forwards everything else to the
# gateway (Fritz!Box) — and keep /etc/resolv.conf as the resolved stub symlink.
- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Point systemd-resolved at dnsmasq (primary) + gateway (fallback)
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (dnsmasq role).
      # Domains=~. routes ALL host lookups through dnsmasq so *.homeserver
      # resolves locally; dnsmasq itself forwards non-local names to the gateway.
      [Resolve]
      DNS={{ network_static_ip }}
      FallbackDNS={{ network_gateway }}
      Domains=~.
  notify: Restart systemd-resolved

- name: Ensure /etc/resolv.conf is the systemd-resolved stub symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    src: ../run/systemd/resolve/stub-resolv.conf
    state: link
    force: true
  notify: Restart systemd-resolved
