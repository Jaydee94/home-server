---
# ============================================================
# dnsmasq role — wildcard DNS for *.homeserver
# ============================================================
# Ubuntu 24.04 uses systemd-resolved with a stub listener on
# 127.0.0.53:53. We disable the stub so dnsmasq can own :53.
# ============================================================

- name: Disable systemd-resolved stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "^#?DNSStubListener="
    line: "DNSStubListener=no"
  notify: Restart systemd-resolved

- name: Flush handlers to apply resolved config before installing dnsmasq
  ansible.builtin.meta: flush_handlers

- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: "{{ 'latest' if auto_upgrade else 'present' }}"
    update_cache: true

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dnsmasq

- name: Point /etc/resolv.conf at local dnsmasq
  ansible.builtin.copy:
    content: "nameserver 127.0.0.1\n"
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"

- name: Allow DNS from local subnet (UFW)
  community.general.ufw:
    rule: allow
    port: "53"
    proto: "{{ item }}"
    src: "{{ local_subnet }}"
  loop:
    - tcp
    - udp

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started
